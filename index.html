<script>
// ============================================================
// STATE
// ============================================================
let SUPABASE_URL = localStorage.getItem('ma_url') || '';
let SUPABASE_KEY = localStorage.getItem('ma_key') || '';
let selectedProviderIds = [];  // przechowujemy ID (integer), nie skróty
let allProviders = [];         // [{id, nazwa, skrot}] — z bazy
let allPackages  = [];         // [{id, nazwa, tier, dostawca_id, dostawca_nazwa, ...}]

// ============================================================
// TABS
// ============================================================
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active','bg-white','text-brand-navy','shadow-sm');
    b.classList.add('text-slate-300');
  });
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active','bg-white','text-brand-navy','shadow-sm');
  btn.classList.remove('text-slate-300');
  if(id === 'library') loadLibrary();
}

// ============================================================
// API
// ============================================================
async function apiGet(table, params='') {
  if(!SUPABASE_URL || !SUPABASE_KEY) return null;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
      headers:{ 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json' }
    });
    return res.ok ? res.json() : null;
  } catch(e){ return null; }
}

async function apiPatch(table, params, body) {
  if(!SUPABASE_URL || !SUPABASE_KEY) return false;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
      method:'PATCH',
      headers:{ 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json', 'Prefer':'return=minimal' },
      body: JSON.stringify(body)
    });
    return res.ok;
  } catch(e){ return false; }
}

// ============================================================
// INIT
// ============================================================
async function init() {
  document.getElementById('cfgUrl').value = SUPABASE_URL;
  document.getElementById('cfgKey').value = SUPABASE_KEY;
  await loadProvidersFromDB();
  await checkDbStatus();
}

async function loadProvidersFromDB() {
  const data = await apiGet('dostawcy', 'select=id,nazwa,skrot&aktywny=eq.true&order=nazwa');
  if(data && data.length > 0) {
    allProviders = data;
  } else {
    // fallback: dostawcy z seed
    allProviders = [
      {id:1,nazwa:'Medicover',skrot:'MED'},{id:2,nazwa:'LuxMed',skrot:'LUX'},
      {id:3,nazwa:'Enel-Med',skrot:'ENE'},{id:4,nazwa:'TU Zdrowie',skrot:'TUZ'},
      {id:5,nazwa:'Polmed',skrot:'POL'},{id:6,nazwa:'Saltus',skrot:'SAL'},
      {id:7,nazwa:'Allianz',skrot:'ALZ'},{id:8,nazwa:'Compensa',skrot:'COM'},
      {id:9,nazwa:'InterRisk',skrot:'INR'},{id:10,nazwa:'PZU Zdrowie',skrot:'PZU'}
    ];
  }
  populateProviderPills();
  populateAllSelects();
}

async function checkDbStatus() {
  const dot = document.getElementById('dotDb');
  const txt = document.getElementById('statusDb');
  if(!SUPABASE_URL || !SUPABASE_KEY) {
    txt.textContent='Wymagana konfiguracja';
    dot.className='w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse'; return;
  }
  const data = await apiGet('dostawcy','select=id&aktywny=eq.true');
  if(data) {
    txt.textContent='Połączono (Online)';
    dot.className='w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]';
    document.getElementById('statusProviders').textContent = data.length;
    const pkts = await apiGet('pakiety','select=id&aktywna=eq.true');
    document.getElementById('statusPackages').textContent = pkts ? pkts.length : '–';
  } else {
    txt.textContent='Błąd połączenia';
    dot.className='w-2.5 h-2.5 rounded-full bg-red-500';
  }
}

// ============================================================
// PROVIDER PILLS — z bazy
// ============================================================
function populateProviderPills() {
  const pills = document.getElementById('providerPills');
  pills.innerHTML = '';
  allProviders.forEach(p => {
    const btn = document.createElement('button');
    btn.className='px-4 py-2 border-2 border-slate-200 text-slate-600 font-bold text-sm rounded-full transition-all hover:border-brand-navy';
    btn.textContent = p.nazwa;
    btn.dataset.id = p.id;
    btn.onclick = () => {
      if(btn.classList.contains('bg-brand-navy')) {
        btn.classList.remove('bg-brand-navy','text-white','border-brand-navy');
        btn.classList.add('border-slate-200','text-slate-600');
        selectedProviderIds = selectedProviderIds.filter(id => id !== p.id);
      } else {
        if(selectedProviderIds.length >= 5){ showNotif('compare','Maksymalnie 5 dostawców.','border-red-500 bg-red-50 text-red-700'); return; }
        btn.classList.remove('border-slate-200','text-slate-600');
        btn.classList.add('bg-brand-navy','text-white','border-brand-navy');
        selectedProviderIds.push(p.id);
      }
    };
    pills.appendChild(btn);
  });
}

function populateAllSelects() {
  ['libProvider','vProvider','aProvider'].forEach(selId => {
    const el = document.getElementById(selId);
    if(!el) return;
    // zachowaj pierwszą opcję
    while(el.options.length > 1) el.remove(1);
    allProviders.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;           // wartość = ID (integer)
      opt.textContent = p.nazwa;
      el.appendChild(opt);
    });
  });
}

// ============================================================
// PORÓWNYWARKA — z bazy przez pakiety_pelne (VIEW)
// ============================================================
async function runComparison() {
  if(selectedProviderIds.length < 2) {
    showNotif('compare','Wybierz minimum 2 dostawców.','border-red-500 bg-red-50 text-red-700'); return;
  }
  const tLow  = parseInt(document.getElementById('tierLow').value);
  const tHigh = parseInt(document.getElementById('tierHigh').value);
  showNotif('compare','Pobieranie danych z bazy...','border-blue-500 bg-blue-50 text-blue-700');

  // Pobierz pakiety dla wybranych dostawców i tierów
  const idList = selectedProviderIds.join(',');
  const params = `select=*&dostawca_id=in.(${idList})&tier=gte.${tLow}&tier=lte.${tHigh}&aktywna=eq.true&order=dostawca_id,tier`;
  const data = await apiGet('pakiety_pelne', params);

  if(!data || data.length === 0) {
    showNotif('compare','Brak danych dla wybranych dostawców i tierów.','border-amber-500 bg-amber-50 text-amber-700'); return;
  }

  document.getElementById('comparisonResult').classList.remove('hidden');
  document.getElementById('comp-badge-low').textContent  = `Tier ${tLow}`;
  document.getElementById('comp-badge-high').textContent = `Tier ${tHigh}`;

  // Grupuj po dostawcy
  const byProvider = {};
  selectedProviderIds.forEach(id => {
    const prov = allProviders.find(p => p.id === id);
    byProvider[id] = { nazwa: prov ? prov.nazwa : id, pakiety: data.filter(d => d.dostawca_id === id) };
  });

  const ROWS = [
    {key:'tier',            label:'Tier',                   fmt: v => `<span class="bg-brand-navy text-white text-xs font-bold px-2 py-0.5 rounded">T${v}</span>`},
    {key:'pakiet_nazwa',    label:'Nazwa wariantu',          fmt: v => `<strong>${v||'–'}</strong>`},
    {key:'telemedycyna',    label:'Telemedycyna',            fmt: v => v ? '✅' : '❌'},
    {key:'ciaza',           label:'Opieka w ciąży',         fmt: v => v ? '✅' : '❌'},
    {key:'leczenie_szpitalne',label:'Leczenie szpitalne',   fmt: v => v ? '✅' : '❌'},
    {key:'hotline_24h',     label:'Hotline 24h',            fmt: v => v ? '✅' : '❌'},
    {key:'aplikacja_mobilna',label:'Aplikacja mobilna',     fmt: v => v ? '✅' : '❌'},
    {key:'jdg',             label:'JDG',                    fmt: v => v ? '✅' : '❌'},
    {key:'min_pracownicy',  label:'Min. pracownicy',        fmt: v => v||'–'},
    {key:'wiek_dzieci_do',  label:'Dzieci do (lat)',        fmt: v => v||'–'},
    {key:'karencja_dni',    label:'Karencja (dni)',         fmt: v => v===0?'Brak':v||'–'},
    {key:'cena_ind_mies',   label:'Składka ind. (zł/mies)', fmt: v => v ? `<strong class="text-brand-pink">${parseFloat(v).toFixed(2)} zł</strong>` : '<em class="text-slate-400">brak danych</em>'},
    {key:'cena_grup_mies',  label:'Składka grup. (zł/mies)',fmt: v => v ? `<strong class="text-brand-pink">${parseFloat(v).toFixed(2)} zł</strong>` : '<em class="text-slate-400">brak danych</em>'},
    {key:'notatki',         label:'Uwagi',                  fmt: v => `<span class="text-xs text-slate-500">${(v||'–').substring(0,80)}${v&&v.length>80?'…':''}</span>`},
  ];

  // Dla każdego dostawcy weź pakiet z najniższym i najwyższym tierem w zakresie
  const cols = selectedProviderIds.map(id => {
    const pkts = byProvider[id].pakiety;
    const low  = pkts.reduce((a,b) => a.tier <= b.tier ? a : b, pkts[0]);
    const high = pkts.reduce((a,b) => a.tier >= b.tier ? a : b, pkts[0]);
    return { nazwa: byProvider[id].nazwa, low, high };
  });

  let html = `<table class="w-full text-left text-sm border-collapse min-w-[900px] compare-table">
    <thead>
      <tr class="bg-brand-navy text-white">
        <th class="p-4 border-b border-slate-700 w-48">Parametr</th>`;
  cols.forEach(c => html += `<th colspan="2" class="p-4 border-b border-slate-700 text-center border-l border-slate-600">${c.nazwa}</th>`);
  html += `</tr><tr class="bg-slate-100 text-slate-600 text-xs uppercase tracking-wider">
        <th class="p-3 border-b border-slate-200"></th>`;
  cols.forEach(() => html += `<th class="p-3 border-b border-slate-200 text-center border-l border-slate-200">Niższy</th><th class="p-3 border-b border-slate-200 text-center">Wyższy</th>`);
  html += `</tr></thead><tbody class="divide-y divide-slate-100">`;

  ROWS.forEach(row => {
    html += `<tr class="hover:bg-slate-50 transition-colors"><td class="p-4 font-semibold text-slate-600 text-xs uppercase tracking-wide">${row.label}</td>`;
    cols.forEach(c => {
      html += `<td class="p-4 text-center border-l border-slate-100">${row.fmt(c.low  ? c.low[row.key]  : null)}</td>`;
      html += `<td class="p-4 text-center">${row.fmt(c.high ? c.high[row.key] : null)}</td>`;
    });
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('compTableWrap').innerHTML = html;
  showNotif('compare',`Załadowano ${data.length} pakietów dla ${cols.length} dostawców.`,'border-emerald-500 bg-emerald-50 text-emerald-700');
}

// ============================================================
// BIBLIOTEKA — z bazy przez VIEW pakiety_pelne
// ============================================================
async function loadLibrary() {
  const el = document.getElementById('libraryTable');
  el.innerHTML = '<div class="flex items-center gap-3 text-slate-500 justify-center py-10"><div class="loader"></div> Ładowanie...</div>';

  const provId  = document.getElementById('libProvider').value;
  const tier    = document.getElementById('libTier').value;
  const version = document.getElementById('libVersion').value.trim();

  let params = 'select=id,pakiet_nazwa,tier,wersja,dostawca_nazwa,telemedycyna,ciaza,leczenie_szpitalne,cena_ind_mies,cena_grup_mies,notatki&aktywna=eq.true&order=dostawca_nazwa,tier';
  if(provId)  params += `&dostawca_id=eq.${provId}`;
  if(tier)    params += `&tier=eq.${tier}`;
  if(version) params += `&wersja=eq.${version}`;

  const data = await apiGet('pakiety_pelne', params);

  if(!data || data.length === 0) {
    el.innerHTML = '<div class="text-center py-10 text-slate-400">Brak wyników dla wybranych filtrów.</div>'; return;
  }

  const tierColors = ['bg-slate-200 text-slate-700','bg-blue-100 text-blue-700','bg-violet-100 text-violet-700','bg-amber-100 text-amber-700','bg-emerald-100 text-emerald-700','bg-rose-100 text-rose-700'];

  let html = `<table class="w-full text-left text-sm border-collapse min-w-[900px]">
    <thead class="bg-slate-100 text-slate-600 text-xs uppercase tracking-wider">
      <tr>
        <th class="p-4">Dostawca</th>
        <th class="p-4">Wariant</th>
        <th class="p-4">Tier</th>
        <th class="p-4">Wersja</th>
        <th class="p-4 text-center">Tele</th>
        <th class="p-4 text-center">Ciąża</th>
        <th class="p-4 text-center">Szpital</th>
        <th class="p-4">Składka ind.</th>
        <th class="p-4">Składka grup.</th>
        <th class="p-4">Notatki</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-100">`;

  data.forEach(p => {
    const tc = tierColors[Math.min((p.tier||1)-1, tierColors.length-1)];
    html += `<tr class="hover:bg-slate-50 transition-colors">
      <td class="p-4 font-bold text-brand-navy">${p.dostawca_nazwa||'–'}</td>
      <td class="p-4 font-semibold">${p.pakiet_nazwa||'–'}</td>
      <td class="p-4"><span class="px-2 py-1 rounded text-xs font-bold ${tc}">T${p.tier||'?'}</span></td>
      <td class="p-4 text-xs text-slate-500 font-mono">${p.wersja||'–'}</td>
      <td class="p-4 text-center">${p.telemedycyna?'✅':'❌'}</td>
      <td class="p-4 text-center">${p.ciaza?'✅':'❌'}</td>
      <td class="p-4 text-center">${p.leczenie_szpitalne?'✅':'❌'}</td>
      <td class="p-4 font-bold text-brand-pink">${p.cena_ind_mies ? parseFloat(p.cena_ind_mies).toFixed(2)+' zł' : '<span class=\"text-slate-300\">–</span>'}</td>
      <td class="p-4 font-bold text-brand-pink">${p.cena_grup_mies ? parseFloat(p.cena_grup_mies).toFixed(2)+' zł' : '<span class=\"text-slate-300\">–</span>'}</td>
      <td class="p-4 text-xs text-slate-500 max-w-xs truncate" title="${(p.notatki||'')}"> ${p.notatki ? p.notatki.substring(0,60)+(p.notatki.length>60?'…':'') : '–'}</td>
    </tr>`;
  });

  html += `</tbody></table><div class="text-xs text-slate-400 p-4 text-right">Wyników: ${data.length}</div>`;
  el.innerHTML = html;
}

// ============================================================
// LOAD PACKAGES FOR SELECT (Admin + Wersja)
// ============================================================
async function loadProviderPackages(targetId, provId) {
  const el = document.getElementById(targetId);
  el.innerHTML = '<option value="">Ładowanie...</option>';
  if(!provId) { el.innerHTML='<option value="">— wybierz dostawcę —</option>'; return; }
  const data = await apiGet('pakiety', `select=id,nazwa,tier&dostawca_id=eq.${provId}&aktywna=eq.true&order=tier,nazwa`);
  el.innerHTML = '<option value="">— wybierz pakiet —</option>';
  (data||[]).forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id; opt.textContent = `T${p.tier} — ${p.nazwa}`;
    el.appendChild(opt);
  });
}

// ============================================================
// SKŁADKI — zapis przez PATCH (ceny nie są w SQL, tylko przez UI)
// ============================================================
async function savePrice() {
  const pakietId = document.getElementById('aPackage').value;
  if(!pakietId){ showNotif('admin','Wybierz pakiet.','border-red-500 bg-red-50 text-red-700'); return; }
  const body = {};
  const ind     = document.getElementById('aPriceInd').value;
  const grup    = document.getElementById('aPriceGrup').value;
  const rodzina = document.getElementById('aPriceRodzina').value;
  if(ind)     body.cena_ind_mies     = parseFloat(ind);
  if(grup)    body.cena_grup_mies    = parseFloat(grup);
  if(rodzina) body.cena_rodzina_mies = parseFloat(rodzina);
  if(Object.keys(body).length === 0){ showNotif('admin','Wpisz przynajmniej jedną składkę.','border-amber-500 bg-amber-50 text-amber-700'); return; }
  const ok = await apiPatch('pakiety', `id=eq.${pakietId}`, body);
  if(ok) {
    showNotif('admin','✓ Składki zapisane w bazie.','border-emerald-500 bg-emerald-50 text-emerald-700');
    // czyść pola
    ['aPriceInd','aPriceGrup','aPriceRodzina'].forEach(id => document.getElementById(id).value='');
  } else {
    showNotif('admin','Błąd zapisu. Sprawdź uprawnienia RLS.','border-red-500 bg-red-50 text-red-700');
  }
}

// ============================================================
// SQL VALIDATION
// ============================================================
function validateAndInsertSQL() {
  const sql   = document.getElementById('sqlInput').value.trim().toUpperCase();
  const notif = document.getElementById('sqlValidation');
  notif.classList.remove('hidden');
  if(!sql){ notif.className='mt-6 p-4 rounded-xl text-sm font-bold border block border-red-500 bg-red-50 text-red-700'; notif.textContent='Wklej kod SQL.'; return; }
  if(!sql.startsWith('INSERT')){ notif.className='mt-6 p-4 rounded-xl text-sm font-bold border block border-red-500 bg-red-50 text-red-700'; notif.textContent='BŁĄD: Dozwolone tylko INSERT INTO.'; return; }
  const priceCols = ['CENA_IND_MIES','CENA_GRUP_MIES','CENA_RODZINA_MIES'];
  const found = priceCols.filter(c => sql.includes(c));
  if(found.length){ notif.className='mt-6 p-4 rounded-xl text-sm font-bold border block border-red-500 bg-red-50 text-red-700'; notif.textContent=`BLOKADA: SQL zawiera kolumny cenowe (${found.join(', ')}). Składki wpisuj przez zakładkę Konfiguracja.`; return; }
  notif.className='mt-6 p-4 rounded-xl text-sm font-bold border block border-emerald-500 bg-emerald-50 text-emerald-700';
  notif.textContent='✓ SQL zwalidowany. Wykonaj w panelu Supabase → SQL Editor.';
}

function clearSQL() {
  document.getElementById('sqlInput').value='';
  document.getElementById('sqlValidation').classList.add('hidden');
}

async function createNewVersion() {
  const pakietId  = document.getElementById('vPackage').value;
  const newVer    = document.getElementById('vNewVersion').value.trim();
  const notif     = document.getElementById('versionNotif');
  if(!pakietId||!newVer||newVer.length!==6){ notif.className='mt-4 p-4 rounded-xl text-sm font-semibold border block border-red-500 bg-red-50 text-red-700'; notif.textContent='Wybierz pakiet i podaj wersję (6 znaków, np. 062026).'; notif.classList.remove('hidden'); return; }
  const src = await apiGet('pakiety', `select=*&id=eq.${pakietId}`);
  if(!src||!src[0]){ notif.className='mt-4 p-4 rounded-xl text-sm font-semibold border block border-red-500 bg-red-50 text-red-700'; notif.textContent='Nie znaleziono pakietu.'; notif.classList.remove('hidden'); return; }
  const clone = {...src[0]};
  delete clone.id; delete clone.data_dodania;
  clone.wersja = newVer;
  clone.cena_ind_mies=null; clone.cena_grup_mies=null; clone.cena_rodzina_mies=null;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/pakiety`, {
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify(clone)
    });
    if(res.ok){
      notif.className='mt-4 p-4 rounded-xl text-sm font-semibold border block border-emerald-500 bg-emerald-50 text-emerald-700';
      notif.textContent=`✓ Klonowanie zakończone. Wersja ${newVer} utworzona (bez cen).`;
    } else {
      notif.className='mt-4 p-4 rounded-xl text-sm font-semibold border block border-red-500 bg-red-50 text-red-700';
      notif.textContent='Błąd zapisu.';
    }
  } catch(e){ notif.textContent='Błąd sieci.'; }
  notif.classList.remove('hidden');
}

// ============================================================
// KONFIGURACJA
// ============================================================
function saveConfig() {
  SUPABASE_URL = document.getElementById('cfgUrl').value.trim();
  SUPABASE_KEY = document.getElementById('cfgKey').value.trim();
  localStorage.setItem('ma_url', SUPABASE_URL);
  localStorage.setItem('ma_key', SUPABASE_KEY);
  checkDbStatus();
  loadProvidersFromDB();
  showNotif('admin','Zapisano konfigurację lokalnie.','border-emerald-500 bg-emerald-50 text-emerald-700');
}

async function testConnection() {
  const status = document.getElementById('connStatus');
  status.textContent='Testowanie...'; status.className='mt-4 text-sm font-semibold text-slate-500';
  const data = await apiGet('dostawcy','select=id&limit=1');
  if(data){ status.textContent='✓ Połączono z Supabase (HTTP 200)'; status.className='mt-4 text-sm font-bold text-emerald-600'; }
  else { status.textContent='✗ Błąd połączenia. Sprawdź URL i klucz API.'; status.className='mt-4 text-sm font-bold text-red-600'; }
}

function showNotif(tab, msg, classes) {
  const el = document.getElementById('notif-'+tab);
  if(!el) return;
  el.className='mb-6 p-4 rounded-xl text-sm font-semibold shadow-sm border block '+classes;
  el.textContent=msg;
  setTimeout(()=>el.classList.add('hidden'),5000);
}
